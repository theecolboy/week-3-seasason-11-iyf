  <main class="page">
    <section class="page-header">
      <p class="eyebrow">Contact</p>
      <h1>Let us connect</h1>
      <p>Use the form layout below or reach me through the links listed beside it.</p>
    </section>

    <section class="contact-layout">
      <form class="contact-form" action="#" method="post">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button class="button primary" type="submit">Send Message</button>
      </form>

      <aside class="panel contact-details">
        <h2>Details</h2>
        <p>Email: kamandestephennd31@gmail.com</p>
        <p>GitHub: @stephen-kamande</p>
        <p>LinkedIn: Stephen Kamande</p>
      </aside>
    </section>
  </main>
